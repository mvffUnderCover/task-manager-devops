version: "3.8"

services:

  postgres-db:
    image: postgres:16
    container_name: postgres-data
    restart: always
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: matar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-api:
    build: .
    container_name: task-api
    ports:
      - "9000:9000"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/taskdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: matar
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  task-frontend:
    build:
      context: ../../task-api-frontend
    container_name: task-frontend
    ports:
      - "3000:80"
    depends_on:
      - task-api

volumes:
  postgres_data: